# ============================================
# Andreas Boutsikas Portal - Docker Compose
# Self-hosted production configuration
# ============================================
#
# Usage:
#   docker compose up -d          # Start all services
#   docker compose logs -f app    # View app logs
#   docker compose exec app sh    # Shell into app container
#   docker compose exec db psql -U postgres -d andreas_portal  # DB shell
#
# First-time setup:
#   1. cp .env.production .env
#   2. vim .env                   # Set POSTGRES_PASSWORD, NEXTAUTH_SECRET, NEXTAUTH_URL
#   3. sudo mkdir -p /var/data/abportal/storage/images /var/data/abportal/storage/zips /var/data/abportal/db
#   4. sudo chown -R 1001:1001 /var/data/abportal
#   5. docker compose up -d --build
#   6. sleep 15
#   7. docker compose run --rm app node ./node_modules/prisma/build/index.js db push --schema=./prisma/schema.prisma
#   8. docker compose run --rm app npm run db:seed  # optional
#
# Rebuild after code changes:
#   docker compose build app && docker compose up -d app
#
# Apply schema changes:
#   docker compose exec -T app node ./node_modules/prisma/build/index.js db push --schema=./prisma/schema.prisma
#
# ============================================

services:
  # ----------------------------------------
  # Application Service
  # ----------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: abportal-app
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/andreas_portal
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - STORAGE_PATH=/data/andreas-portal
    volumes:
      # Bind mount: host directory is directly accessible at /var/data/abportal/storage
      - type: bind
        source: /var/data/abportal/storage
        target: /data/andreas-portal
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - abportal-network

  # ----------------------------------------
  # PostgreSQL Database
  # ----------------------------------------
  db:
    image: postgres:15-alpine
    container_name: abportal-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=andreas_portal
    volumes:
      # Bind mount: host directory is directly accessible at /var/data/abportal/db
      - type: bind
        source: /var/data/abportal/db
        target: /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d andreas_portal"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - abportal-network

# ============================================
# Docker Network
# ============================================
networks:
  abportal-network:
    driver: bridge
